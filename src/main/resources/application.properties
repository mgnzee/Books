spring.application.name=books

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/books}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

jwt.secret=${JWT_SECRET:default_value}
jwt.expiration = ${JWT_EXPIRATION:0}


#Flyway

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

#S3

s3.endpoint=http://localhost:9000
s3.access-key=${S3_ACCESS_KEY:admin}
s3.secret-key=${S3_SECRET_KEY:strongpassword}
s3.region=us-east-1

s3.buckets.public=public-assets
s3.buckets.library=library